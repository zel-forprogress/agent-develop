<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrewAI 研究助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- 如果 Tailwind CDN 加载失败，提供保底的基础样式 -->
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f9fafb; margin: 0; padding: 0; }
        .container { max-width: 56rem; margin-left: auto; margin-right: auto; padding-left: 1rem; padding-right: 1rem; padding-top: 2rem; padding-bottom: 2rem; }
        .bg-white { background-color: white; }
        .rounded-xl { border-radius: 0.75rem; }
        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .p-6 { padding: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        .text-center { text-align: center; }
        .text-blue-600 { color: #2563eb; }
        .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
        .font-extrabold { font-weight: 800; }
        .flex { display: flex; }
        .flex-1 { flex: 1 1 0%; }
        .gap-4 { gap: 1rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .border { border: 1px solid #d1d5db; }
        .rounded-lg { border-radius: 0.5rem; }
        .bg-blue-600 { background-color: #2563eb; color: white; border: none; cursor: pointer; }
        .bg-blue-600:hover { background-color: #1d4ed8; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .markdown-body {
            line-height: 1.6;
            color: #24292e;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }
        .markdown-body ul {
            list-style-type: disc;
            padding-left: 2em;
        }
        .markdown-body pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">
                <i class="fas fa-robot mr-2"></i>CrewAI 研究助手
            </h1>
            <p class="text-gray-600">输入一个主题，让 AI 团队为您编写深度研究报告</p>
        </header>

        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <form action="/research" method="post" class="flex flex-col md:flex-row gap-4">
                <input type="text" name="topic" required 
                       placeholder="例如：2026年AI Agent开发最新趋势" 
                       value="{{ topic if topic else '' }}"
                       class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" 
                        id="submitBtn"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition duration-300 ease-in-out transform hover:scale-105 flex items-center justify-center">
                    <span id="btnText">开始研究</span>
                    <i id="loadingIcon" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                </button>
            </form>
        </div>

        {% if result %}
        <div class="bg-white rounded-xl shadow-lg p-8 markdown-body animate-fade-in">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 border-none">研究结果：{{ topic }}</h2>
            <div class="prose max-w-none">
                {{ result | safe }}
            </div>
            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <button onclick="window.print()" class="text-blue-500 hover:text-blue-700 text-sm">
                    <i class="fas fa-print mr-1"></i>打印或保存为 PDF
                </button>
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        const form = document.querySelector('form');
        const btn = document.getElementById('submitBtn');
        const text = document.getElementById('btnText');
        const icon = document.getElementById('loadingIcon');

        form.onsubmit = () => {
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            text.innerText = '研究中（预计 1-2 分钟）...';
            icon.classList.remove('hidden');
        };
    </script>
</body>
</html>
